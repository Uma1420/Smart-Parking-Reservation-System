<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Parking | Smart Parking Reservation System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body onload="loadParking()">

<header class="header">

    <div>

        <h1>🚗 Smart Parking Reservation System</h1>

        <p id="currentDateTime"></p>

    </div>

    <div class="header-buttons">

        <button onclick="window.location.href='dashboard.html'">
            📊 Dashboard
        </button>

        <button onclick="toggleDarkMode()">
            🌙 Dark Mode
        </button>

        <button onclick="logout()">
            🚪 Logout
        </button>

    </div>

</header>

<div class="parking-container">

    <!-- LEFT PANEL -->

    <div class="form-box">

        <h2>📋 Pending Reservation Requests</h2>

        <div id="pendingReservations">

            <p style="text-align:center;color:gray;">
                No Pending Requests
            </p>

        </div>

        <hr>

        <h2>🔍 Search Vehicle</h2>

        <input
            type="text"
            id="searchVehicle"
            placeholder="Enter Vehicle Number">

        <small id="searchError"
               style="color:red;display:block;margin-bottom:10px;">
        </small>

        <button onclick="searchVehicle()">
            🔍 Search Vehicle
        </button>

        <div id="searchResult" class="search-result"></div>

        <hr>

        <button class="reset-btn"
                onclick="resetParking()">

            🔄 Reset Parking

        </button>

    </div>

    <!-- RIGHT PANEL -->

    <div class="slots-box">

        <h2>🅿️ Parking Slots</h2>

        <div id="parkingSlots" class="slots-grid">

                        <!-- Parking slots will be generated by JavaScript -->

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
