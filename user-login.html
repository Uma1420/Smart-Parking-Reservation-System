<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>User Login | Smart Parking Reservation System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="login-container">

<div class="login-card">

<div class="logo">

🚗

</div>

<h1>User Login</h1>

<p class="subtitle">

Login to reserve your parking slot

</p>

<div class="input-group">

<label>Email</label>

<input
type="email"
id="userEmail"
placeholder="Enter Email">

<small id="userEmailError" style="color:#FFD54F;"></small>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="userPassword"
placeholder="Enter Password">

<small id="userPasswordError" style="color:#FFD54F;"></small>

</div>

<button class="login-btn" onclick="userLogin()">

🔐 Login

</button>

<br><br>

<p>

Don't have an account?

<a href="register.html"
style="color:white;font-weight:bold;">

Register

</a>

</p>

<p id="userLoginMessage"></p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
